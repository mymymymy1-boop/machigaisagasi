<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Soft yellow background with rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#FFEB99"/>
  <!-- Subtle inner highlight -->
  <rect x="40" y="40" width="432" height="432" rx="72" ry="72" fill="#FFF5C2" opacity="0.6"/>

  <!-- Smiling face circle (the thing being magnified) -->
  <g id="face">
    <circle cx="220" cy="230" r="120" fill="#FFD93D" stroke="#333" stroke-width="10" stroke-linejoin="round"/>
    <!-- Eyes -->
    <circle cx="185" cy="215" r="14" fill="#333"/>
    <circle cx="255" cy="215" r="14" fill="#333"/>
    <!-- Eye highlights -->
    <circle cx="190" cy="210" r="4" fill="#FFFFFF"/>
    <circle cx="260" cy="210" r="4" fill="#FFFFFF"/>
    <!-- Cheeks -->
    <circle cx="160" cy="255" r="14" fill="#FFB5A7" opacity="0.7"/>
    <circle cx="280" cy="255" r="14" fill="#FFB5A7" opacity="0.7"/>
    <!-- Smile -->
    <path d="M170 270 Q220 320 270 270" fill="none" stroke="#333" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Magnifying glass over the face -->
  <g id="magnifier">
    <!-- Glass lens (transparent ring) -->
    <circle cx="290" cy="260" r="140" fill="none" stroke="#4D96FF" stroke-width="22" stroke-linejoin="round"/>
    <!-- Inner highlight on lens -->
    <path d="M210 200 Q200 240 215 280" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <!-- Handle -->
    <line x1="395" y1="365" x2="470" y2="440" stroke="#333" stroke-width="34" stroke-linecap="round"/>
    <line x1="395" y1="365" x2="470" y2="440" stroke="#6BCB77" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Small decorative sparkle stars -->
  <g id="sparkles" fill="#FFB5A7" stroke="#333" stroke-width="4" stroke-linejoin="round">
    <path d="M90 110 L98 128 L116 132 L98 138 L90 156 L82 138 L64 132 L82 128 Z"/>
    <path d="M440 90 L446 104 L460 108 L446 112 L440 126 L434 112 L420 108 L434 104 Z"/>
  </g>
</svg>
